name: Generuj APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie kodu źródłowego
      uses: actions/checkout@v4

    - name: Instalacja Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalacja Java (JDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Instalacja Apache Cordova
      run: npm install -g cordova

    - name: Budowanie projektu Android
      run: |
        cordova create emerytura_app com.tomek.nowaemerytura "Nowa Emerytura"
        cd emerytura_app
        rm -rf www
        cp -r ../www www
        cp ../config.xml config.xml
        cordova platform add android
        cordova build android --debug

    - name: Udostępnienie gotowego pliku APK
      uses: actions/upload-artifact@v4
      with:
        name: Nowa_Emerytura_APK
        # Elastyczna ścieżka ze znakiem gwiazdki – znajdzie plik APK bez względu na dokładną strukturę folderów
        path: emerytura_app/**/*.apk
