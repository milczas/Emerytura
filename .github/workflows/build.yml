name: Generuj APK (Cordova)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie kodu źródłowego
      uses: actions/checkout@v4

    - name: Instalacja Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Instalacja Java (JDK 11)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Instalacja Apache Cordova
      run: npm install -g cordova

    - name: Przygotowanie projektu Cordova
      run: |
        mkdir cordova_project
        cd cordova_project
        cordova create app com.tomek.nowaemerytura "Nowa Emerytura"
        rm -rf app/www/*
        cp -r ../index.html app/www/
        if [ -f ../icon.png ]; then cp ../icon.png app/www/; fi
        cp ../config.xml app/
        cd app
        cordova platform add android

    - name: Kompilacja pliku APK
      run: |
        cd cordova_project/app
        cordova build android --debug

    - name: Udostępnienie gotowego pliku APK do pobrania
      uses: actions/upload-artifact@v4
      with:
        name: Nowa_Emerytura_APK
        path: cordova_project/app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
