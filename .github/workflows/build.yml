name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create emerytura com.milczas.emerytura Emerytura
        cd emerytura
        cordova platform add android
        rm -rf www/*
        cp ../index.html www/
        cp ../icon.png www/
        cp ../config.xml .
        cordova build android --packageType=apk --debug

    - name: Upload APK
      # ZMIANA: Podbita wersja do v4, która jest kategorycznie wymagana przez GitHub w 2026 roku
      uses: actions/upload-artifact@v4
      with:
        name: Nowa_Emerytura_APK
        path: emerytura/platforms/android/app/build/outputs/apk/debug/app-debug.apk
