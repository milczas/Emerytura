name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Budowanie projektu Android
      run: |
        # 1. Tworzymy wymagany przez Cordovę folder www w pamięci serwera
        mkdir -p www
        
        # 2. Bezpiecznie przenosimy tam luźne pliki z wierzchu
        cp index.html www/ 2>/dev/null || true
        cp icon.png www/ 2>/dev/null || true
        
        # 3. Instalacja platformy i budowanie na bazie istniejącego package.json
        cordova platform add android --nosave
        cordova build android --packageType=apk --debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Nowa_Emerytura_APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
