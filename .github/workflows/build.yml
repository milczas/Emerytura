name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Budowanie projektu Android
      run: |
        mkdir -p www
        cp index.html www/ 2>/dev/null || true
        cp icon.png www/ 2>/dev/null || true
        
        # Wymuszenie stabilnego Gradle 8.7 bezpośrednio w konfiguracji kompilacji platformy
        export CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL="https://services.gradle.org/distributions/gradle-8.7-bin.zip"
        
        cordova platform add android@12.0.0 --nosave
        cordova build android --packageType=apk --debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Nowa_Emerytura_APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
