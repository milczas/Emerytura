name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Budowanie projektu Android
      run: |
        # 1. Pobieramy stabilne Gradle 8.7 w tle i rozpakowujemy je na serwerze
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
        sudo unzip -oq gradle-8.7-bin.zip -d /usr/share
        
        # 2. BRUTALNE ROZWIĄZANIE: Nadpisujemy systemowy skrót w Linuksie, aby wskazywał na wersję 8.7 zamiast 9.5.1
        sudo ln -sf /usr/share/gradle-8.7/bin/gradle /usr/share/gradle-9.5.1/bin/gradle
        sudo ln -sf /usr/share/gradle-8.7/bin/gradle /usr/bin/gradle
        
        # 3. Przygotowanie struktury plików
        mkdir -p www
        cp index.html www/ 2>/dev/null || true
        cp icon.png www/ 2>/dev/null || true
        
        # 4. Budowanie projektu (teraz system fizycznie odpali wersję 8.7 z XmlParserem)
        cordova platform add android@12.0.0 --nosave
        cordova build android --packageType=apk --debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Nowa_Emerytura_APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
